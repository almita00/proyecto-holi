<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | Holi Taller de Arte</title>
  <link rel="stylesheet" href="../css/main.css">
</head>

<body>

  <header class="header">
    <div class="header_container">
      <h1 class="header_title">HOLI Taller de Arte</h1>

      <nav class="nav" aria-label="Navegación principal">
        <ul class="nav_list">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../pages/taller.html">El Taller</a></li>
          <li><a href="../pages/productos.html">Productos</a></li>
          <li><a href="../pages/talleres.html">Talleres</a></li>
          <li><a href="../pages/contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-productos">
    <div class="productos-layout">

      <!-- SECCIÓN PRODUCTOS -->
      <section class="productos-section">
        <h2>Nuestros Productos</h2>
        <div class="productos">

          <article class="producto">
            <img src="../img/producto-1.jpg" alt="Ensaladera XXL">
            <h3>Ensaladera XXL</h3>
            <p class="precio">$45.000</p>
            <button class="btn-agregar"
              data-id="1"
              data-nombre="Ensaladera XXL"
              data-precio="45000">
              Agregar
            </button>
          </article>

          <article class="producto">
            <img src="../img/producto-1.jpg" alt="Platos XL">
            <h3>Platos XL</h3>
            <p class="precio">$35.000</p>
            <button class="btn-agregar"
              data-id="2"
              data-nombre="Platos XL"
              data-precio="35000">
              Agregar
            </button>
          </article>

          <article class="producto">
            <img src="../img/producto-1.jpg" alt="Cazuelas">
            <h3>Cazuelas</h3>
            <p class="precio">$25.000</p>
            <button class="btn-agregar"
              data-id="3"
              data-nombre="Cazuelas"
              data-precio="25000">
              Agregar
            </button>
          </article>

        </div>

      </section>

      <!-- SECCIÓN CARRITO -->
      <aside class="carrito-section">

        <h3>🛒 Carrito</h3>
        <p><span id="contador-carrito">0</span> productos</p>

        <ul id="lista-carrito" class="carrito-lista"></ul>

        <button id="vaciar-carrito" class="btn-vaciar">
          Vaciar carrito
        </button>

      </aside>

    </div>

  </main>

  <footer>
    <p>&copy; 2026 Holi Taller de Arte</p>
  </footer>

  <script src="../js/main.js"></script>

</body>
</html>
